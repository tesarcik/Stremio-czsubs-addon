<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nastavení Titulky.com Addonu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f6f7f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #0a263d;
            margin-top: 0;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0a263d;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #123d61;
        }
    </style>
</head>

<body>
    <div class="container">
        <img src="/media/logo_t.png" alt="Titulky Logo"
            style="display: block; margin: 0 auto 15px auto; width: 80px; height: 80px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">
        <h1>Titulky.com Addon</h1>
        <p>Zadejte své přihlašovací údaje z portálu Titulky.com. Tyto údaje nebudou nikam ukládány, budou pouze součástí
            odkazu, který addon používá ke stažení titulků v momentě, kdy si nějaké vyberete.</p>
        <form id="configForm">
            <label for="username">Uživatelské jméno</label>
            <input type="text" id="username" required>

            <label for="password">Heslo</label>
            <input type="password" id="password" required>

            <button type="submit">Nainstalovat doplněk</button>
        </form>
    </div>

    <script>
        document.getElementById('configForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            const urlPath = window.location.pathname.replace('/configure', '');
            const configObj = { username: user, password: pass, cb: Date.now() };
            const configString = encodeURIComponent(JSON.stringify(configObj));

            const host = window.location.host;
            const protocol = window.location.protocol;

            let manifestUrl = `${protocol}//${host}${urlPath}/${configString}/manifest.json`;
            manifestUrl = manifestUrl.replace(/([^:])\/\//g, '$1/');

            const stremioUrl = manifestUrl.replace(/^https?:\/\//, 'stremio://');
            window.location.href = stremioUrl;

            let resultDiv = document.getElementById('result');
            if (!resultDiv) {
                resultDiv = document.createElement('div');
                resultDiv.id = 'result';
                resultDiv.style.marginTop = '20px';
                resultDiv.style.padding = '15px';
                resultDiv.style.backgroundColor = '#eef';
                resultDiv.style.borderRadius = '5px';
                resultDiv.style.border = '1px solid #ccd';
                document.querySelector('.container').appendChild(resultDiv);
            }

            resultDiv.innerHTML = `
                <p style="color: #333; font-weight: bold; margin-bottom: 5px;">Otevírám aplikaci Stremio...</p>
                <p style="color: #666; font-size: 13px; margin-top: 10px;">Pokud se aplikace neotevřela automaticky, můžete kliknout na tlačítko níže:</p>
                <a href="${stremioUrl}" style="display: block; text-align: center; width: 100%; box-sizing: border-box; padding: 12px; margin-top: 10px; background-color: #0a263d; color: white; text-decoration: none; border-radius: 4px; font-weight: bold;">Otevřít ve Stremiu</a>
            `;
        });
    </script>
</body>

</html>
