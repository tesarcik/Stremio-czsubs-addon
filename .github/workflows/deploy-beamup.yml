name: Deploy to Beamup

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy to Beamup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BEAMUP_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan a.baby-beamup.club >> ~/.ssh/known_hosts
          
          git remote add beamup git@a.baby-beamup.club:tesarcik/StremioCZsubs.git || true
          git push -f beamup HEAD:master
